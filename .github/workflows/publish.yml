name: Publish

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack packages
        run: |
          mkdir -p /tmp/packs
          for pkg in packages/core packages/ai-auditor packages/cli packages/mcp; do
            pnpm --dir "$pkg" pack --pack-destination /tmp/packs
          done

      - name: Publish @aria51/core
        run: npm publish /tmp/packs/aria51-core-*.tgz --access public

      - name: Publish @aria51/ai-auditor
        run: npm publish /tmp/packs/aria51-ai-auditor-*.tgz --access public

      - name: Publish aria51
        run: npm publish /tmp/packs/aria51-0.*.tgz --access public

      - name: Publish @aria51/mcp
        run: npm publish /tmp/packs/aria51-mcp-*.tgz --access public
