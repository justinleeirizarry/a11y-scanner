name: Publish

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack packages
        run: |
          mkdir -p /tmp/packs
          for pkg in packages/core packages/ai-auditor packages/cli packages/mcp; do
            pnpm --dir "$pkg" pack --pack-destination /tmp/packs
          done

      - name: Publish tarballs via npm (OIDC)
        run: |
          for tgz in /tmp/packs/*.tgz; do
            npm publish "$tgz" --access public
          done
